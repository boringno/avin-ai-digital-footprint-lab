name: collect-ai-signals

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  collect-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Collect AI signals into Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_AI_SIGNAL_DATABASE_ID: ${{ secrets.NOTION_AI_SIGNAL_DATABASE_ID }}
        run: node scripts/collect-ai-signals.js
